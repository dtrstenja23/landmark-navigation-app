paths:
  /api/events:
    get:
      summary: List all events
      tags: [Events]
      responses:
        200:
          description: List of events
    post:
      summary: Create an event
      tags: [Events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: integer
                step_id:
                  type: integer
                event_type:
                  type: string
                  enum: [missed_turn, landmark_shown, fallback_used, reroute_triggered]
                timestamp:
                  type: string
                  format: date-time
                reaction_time_ms:
                  type: integer
                user_lat:
                  type: number
                user_lng:
                  type: number
                metadata:
                  type: object
      responses:
        201:
          description: Event created
        400:
          description: Validation failed
  /api/events/{id}:
    get:
      summary: Get an event by id
      tags: [Events]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Event found
        404:
          description: Event not found
    patch:
      summary: Update an event
      tags: [Events]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: integer
                step_id:
                  type: integer
                event_type:
                  type: string
                  enum: [missed_turn, landmark_shown, fallback_used, reroute_triggered]
                timestamp:
                  type: string
                  format: date-time
                reaction_time_ms:
                  type: integer
                user_lat:
                  type: number
                user_lng:
                  type: number
                metadata:
                  type: object
      responses:
        200:
          description: Event updated
        400:
          description: Validation failed
        404:
          description: Event not found
    delete:
      summary: Delete an event
      tags: [Events]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        204:
          description: Event deleted
        404:
          description: Event not found
