paths:
  /api/landmarks:
    get:
      summary: List all landmarks
      tags: [Landmarks]
      responses:
        200:
          description: List of landmarks
    post:
      summary: Create a landmark
      tags: [Landmarks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, lat, lng]
              properties:
                name:
                  type: string
                lat:
                  type: number
                lng:
                  type: number
                type:
                  type: string
                  enum: [building, intersection, shop, monument, transit_stop]
                google_place_id:
                  type: string
                verified:
                  type: boolean
                source:
                  type: string
                  enum: [google_places, osm, manual]
      responses:
        201:
          description: Landmark created
        400:
          description: Validation failed
        409:
          description: google_place_id already exists
  /api/landmarks/{id}:
    get:
      summary: Get a landmark by id
      tags: [Landmarks]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Landmark found
        404:
          description: Landmark not found
    patch:
      summary: Update a landmark
      tags: [Landmarks]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                lat:
                  type: number
                lng:
                  type: number
                type:
                  type: string
                  enum: [building, intersection, shop, monument, transit_stop]
                google_place_id:
                  type: string
                verified:
                  type: boolean
                source:
                  type: string
                  enum: [google_places, osm, manual]
      responses:
        200:
          description: Landmark updated
        400:
          description: Validation failed
        404:
          description: Landmark not found
    delete:
      summary: Delete a landmark
      tags: [Landmarks]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        204:
          description: Landmark deleted
        404:
          description: Landmark not found
